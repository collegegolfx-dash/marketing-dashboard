<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Coverage Dashboard — CGX · TUGR · Committed Golf</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #0B0F1A; color: #E0E0E0; min-height: 100vh; padding: 24px 20px; }
button { font-family: inherit; }

.header { margin-bottom: 28px; }
.header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.header-bar { width: 4px; height: 36px; background: linear-gradient(180deg, #43A047, #1565C0); border-radius: 2px; }
h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
.subtitle { margin: 4px 0 0 16px; font-size: 13px; color: #78909C; }

.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi-card { background: #141926; border-radius: 12px; padding: 16px 18px; border: 1px solid #1E2538; position: relative; overflow: hidden; }
.kpi-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1; }
.kpi-label { font-size: 13px; font-weight: 600; color: #B0BEC5; margin-top: 4px; }
.kpi-sub { font-size: 11px; color: #546E7A; margin-top: 2px; }

.urgent-banner { background: rgba(255,112,67,0.08); border: 1px solid rgba(255,112,67,0.25); border-radius: 10px; padding: 12px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.urgent-title { font-size: 13px; font-weight: 700; color: #FF7043; }
.urgent-sub { font-size: 11px; color: #FFAB91; }

.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.view-tabs { display: flex; gap: 4px; background: #141926; border-radius: 8px; padding: 3px; }
.view-tab { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: #78909C; transition: all 0.2s; }
.view-tab.active { background: #1E88E5; color: #fff; }
.filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #1E2538; cursor: pointer; font-size: 11px; font-weight: 600; background: transparent; color: #78909C; transition: all 0.15s; }
.filter-btn.active { border-color: #1E88E5; background: rgba(30,136,229,0.12); color: #1E88E5; }

.matrix { background: #141926; border-radius: 12px; border: 1px solid #1E2538; overflow: hidden; }
.matrix-header, .matrix-row { display: grid; grid-template-columns: 200px repeat(5, 1fr) 70px; }
.matrix-header { border-bottom: 2px solid #1E2538; }
.matrix-header div { padding: 12px 8px; font-size: 11px; font-weight: 700; color: #546E7A; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
.matrix-header div:first-child { text-align: left; padding-left: 16px; }
.matrix-row { cursor: pointer; border-bottom: 1px solid #1E2538; transition: background 0.15s; }
.matrix-row:hover { background: #1A2236 !important; }
.matrix-row.even { background: #141926; }
.matrix-row.odd { background: #161C2E; }
.matrix-row.selected { background: #1A2236 !important; }
.channel-cell { padding: 14px 16px; display: flex; align-items: center; gap: 8px; }
.channel-icon { font-size: 18px; }
.channel-name { font-size: 13px; font-weight: 600; color: #E0E0E0; }
.phase-cell { padding: 10px 8px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 2px; }
.status-cell { padding: 14px 8px; display: flex; justify-content: center; align-items: center; }

.pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin: 1px 2px; white-space: nowrap; }
.status-badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; }
.empty-phase { font-size: 11px; color: #546E7A; font-style: italic; }

.detail-panel { padding: 14px 24px 14px 52px; background: #1A2236; border-bottom: 1px solid #1E2538; display: none; }
.detail-panel.open { display: block; }
.detail-assessment { font-size: 12px; line-height: 1.5; }
.detail-phases { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.detail-phase { background: #0B0F1A; border-radius: 8px; padding: 8px 12px; min-width: 130px; }
.detail-phase-label { font-size: 10px; color: #78909C; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.detail-phase-status { display: flex; align-items: center; gap: 6px; }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.detail-phase-note { font-size: 10px; color: #90A4AE; margin-top: 4px; font-style: italic; }

/* Team View */
.team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.team-card { background: #141926; border-radius: 12px; padding: 20px; border: 1px solid #1E2538; position: relative; overflow: hidden; }
.team-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.team-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.team-name { font-size: 17px; font-weight: 700; color: #fff; }
.team-role { font-size: 12px; color: #78909C; }
.team-type-badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; }
.team-stats { display: flex; gap: 20px; margin-bottom: 12px; }
.team-stat-val { font-size: 22px; font-weight: 800; }
.team-stat-label { font-size: 10px; color: #546E7A; }
.load-bar { height: 6px; background: #1E2538; border-radius: 3px; overflow: hidden; }
.load-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.team-note { margin-top: 10px; padding: 6px 10px; border-radius: 6px; font-size: 11px; }

/* Gaps View */
.gap-card { background: #141926; border-radius: 12px; padding: 16px 20px; border: 1px solid #1E2538; display: grid; grid-template-columns: 60px 1fr 1fr 120px 120px; gap: 16px; align-items: center; margin-bottom: 10px; }
.gap-priority { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 800; }
.gap-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.gap-desc { font-size: 12px; color: #90A4AE; line-height: 1.4; }
.gap-section-label { font-size: 10px; color: #546E7A; font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }
.gap-section-text { font-size: 12px; color: #B0BEC5; line-height: 1.4; }
.gap-cost { font-size: 12px; color: #E0E0E0; font-weight: 600; }
.gap-timeline { font-size: 12px; font-weight: 600; }

.footer { margin-top: 24px; padding: 16px 20px; background: #141926; border-radius: 12px; border: 1px solid #1E2538; }
.footer-title { font-size: 12px; font-weight: 700; color: #78909C; margin-bottom: 8px; }
.footer-roster { display: flex; gap: 12px; flex-wrap: wrap; }
.roster-item { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: #0B0F1A; border-radius: 8px; border: 1px solid #1E2538; }
.roster-dot { width: 8px; height: 8px; border-radius: 50%; }
.roster-name { font-size: 11px; font-weight: 600; color: #B0BEC5; }
.roster-role { font-size: 10px; color: #546E7A; }

.hidden { display: none; }

@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .matrix-header, .matrix-row { grid-template-columns: 160px repeat(5, 1fr) 60px; }
  .gap-card { grid-template-columns: 50px 1fr; }
  .team-grid { grid-template-columns: 1fr; }
}
@media (max-width: 700px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .matrix-header, .matrix-row { grid-template-columns: 140px repeat(5, 80px) 60px; overflow-x: auto; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-bar"></div>
    <h1>Marketing Coverage Dashboard</h1>
  </div>
  <p class="subtitle">CGX · TUGR · Committed Golf — Team capacity & channel coverage</p>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="urgent-banner">
  <span style="font-size:20px">⏰</span>
  <div>
    <div class="urgent-title">Nick's team exits March 11 — handoff deadline approaching</div>
    <div class="urgent-sub">Email handoff must be complete. Ensure Klaviyo access, automations, and templates are transferred.</div>
  </div>
</div>

<div class="controls">
  <div class="view-tabs" id="viewTabs"></div>
  <div class="filter-btns" id="filterBtns"></div>
</div>

<div id="matrixView"></div>
<div id="teamView" class="hidden"></div>
<div id="gapsView" class="hidden"></div>

<div class="footer">
  <div class="footer-title">TEAM ROSTER</div>
  <div class="footer-roster" id="footerRoster"></div>
</div>

<script>
const TEAM = [
  { name: "Jeff Hensiek", short: "Jeff", role: "Marketing Director", type: "FT", color: "#5C6BC0" },
  { name: "Jessica Parker", short: "Jessica", role: "PT Content / Brand Voice", type: "PT", color: "#AB47BC" },
  { name: "Esther Lee", short: "Esther", role: "PT Social Media", type: "PT", color: "#26A69A" },
  { name: "Erika DeSanty", short: "Erika", role: "CGX Camp Operations", type: "FT", color: "#EF5350" },
  { name: "Ameer", short: "Ameer", role: "Landing Pages / Web", type: "CTR", color: "#78909C" },
  { name: "Anthony / Roody", short: "Anthony/Roody", role: "Developers (TUGR & CG)", type: "CTR", color: "#8D6E63" },
  { name: "Nick's Team", short: "Nick's Team", role: "Email (through March 11)", type: "OUT", color: "#FF7043" },
  { name: "Ryan Noll", short: "Ryan Noll", role: "Freelance (high-end edits & video)", type: "CTR", color: "#FFB74D" },
  { name: "Freelancers", short: "Freelancers", role: "Video edits (various)", type: "CTR", color: "#BDBDBD" },
  { name: "Josh", short: "Josh", role: "Leadership / Partnerships", type: "FT", color: "#FF8A65" },
  { name: "KFPR", short: "KFPR", role: "PR Firm (external)", type: "CTR", color: "#7E57C2" },
];

const STATUS = { covered: { label: "Covered", color: "#43A047", bg: "#E8F5E9" }, partial: { label: "Partial", color: "#F9A825", bg: "#FFF8E1" }, gap: { label: "Gap", color: "#E53935", bg: "#FFEBEE" }, transition: { label: "Transitioning", color: "#FB8C00", bg: "#FFF3E0" } };

const CHANNELS = [
  { name: "Email Marketing", icon: "✉️", phases: { strategy: { owners: ["Jeff"], status: "covered" }, content: { owners: ["Jessica", "Jeff"], status: "partial" }, execution: { owners: ["Nick's Team", "Jeff"], status: "transition", note: "Nick's team through March 11 → Jeff absorbs" }, monitoring: { owners: ["Jeff"], status: "partial" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "transition", criticalNote: "P0: Nick's team available through March 11. Jeff absorbs execution after. Need Klaviyo owner long-term." },
  { name: "Social Media", icon: "📱", phases: { strategy: { owners: ["Jeff"], status: "covered" }, content: { owners: ["Jessica", "Esther"], status: "covered" }, execution: { owners: ["Esther"], status: "partial", note: "Need additional hours / budget allocated" }, monitoring: { owners: ["Esther", "Jeff"], status: "partial", note: "Need more coverage hours" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "Jessica owns voice/content. Esther executes. Budget available for additional social hours — need to expand." },
  { name: "Paid Ads (Meta)", icon: "📊", phases: { strategy: { owners: ["Jeff"], status: "partial", note: "Single owner" }, content: { owners: ["Jeff", "Jessica"], status: "partial" }, execution: { owners: ["Jeff"], status: "partial", note: "No backup" }, monitoring: { owners: ["Jeff"], status: "partial", note: "No backup" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "P0: Jeff is single point of failure. Consider fractional PPC specialist for peak season." },
  { name: "Paid Ads (Google)", icon: "🔍", phases: { strategy: { owners: ["Jeff"], status: "partial" }, content: { owners: ["Jeff"], status: "partial" }, execution: { owners: ["Jeff"], status: "partial" }, monitoring: { owners: ["Jeff"], status: "partial" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "P0: Same single-owner risk. Keyword restructuring underway for CG." },
  { name: "Website / Landing Pages", icon: "🌐", phases: { strategy: { owners: ["Jeff"], status: "covered" }, content: { owners: ["Jessica", "Jeff"], status: "covered" }, execution: { owners: ["Ameer", "Anthony/Roody"], status: "covered", note: "Ameer = landing pages; devs = TUGR/CG platforms" }, monitoring: { owners: ["Jeff"], status: "covered" }, reporting: { owners: ["Jeff"], status: "covered" } }, overallStatus: "covered", criticalNote: "Best-covered channel. Ameer builds landing pages. Anthony/Roody on TUGR & CG platforms. Jessica owns copy." },
  { name: "SEO & Blog Content", icon: "📝", phases: { strategy: { owners: ["Jeff"], status: "partial" }, content: { owners: ["Jessica"], status: "covered" }, execution: { owners: ["Jessica", "Ameer"], status: "partial" }, monitoring: { owners: ["Jeff"], status: "partial" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "Jessica owns writing across all 3 brands. Minor ramp-up from CG launch experience. Need keyword cadence." },
  { name: "Partnerships & Sponsorships", icon: "🤝", phases: { strategy: { owners: ["Josh"], status: "covered", note: "Josh secures deals" }, content: { owners: ["Jeff", "Jessica"], status: "covered" }, execution: { owners: ["Jeff"], status: "covered", note: "Jeff manages once under contract" }, monitoring: { owners: ["Jeff"], status: "covered" }, reporting: { owners: ["Jeff"], status: "covered" } }, overallStatus: "covered", criticalNote: "Josh secures partnerships/sponsorships. Jeff manages post-contract. Clear handoff." },
  { name: "Video Content", icon: "🎬", phases: { strategy: { owners: ["Jeff"], status: "covered" }, content: { owners: ["Esther", "Ryan Noll", "Freelancers"], status: "partial" }, execution: { owners: ["Ryan Noll", "Freelancers"], status: "partial", note: "Ryan Noll for high-end; other freelancers for edits" }, monitoring: { owners: ["Jeff"], status: "partial" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "Ryan Noll handles high-end edits & production. Other freelancers for video edits. Esther supports content." },
  { name: "PR / Media Relations", icon: "📰", phases: { strategy: { owners: ["Josh"], status: "covered" }, content: { owners: ["KFPR"], status: "covered" }, execution: { owners: ["KFPR"], status: "covered" }, monitoring: { owners: ["Jeff"], status: "covered" }, reporting: { owners: ["KFPR"], status: "covered" } }, overallStatus: "covered", criticalNote: "KFPR handles content, execution & reporting. Josh leads strategy. Jeff monitors." },
  { name: "SMS / Push Notifications", icon: "💬", phases: { strategy: { owners: [], status: "gap" }, content: { owners: [], status: "gap" }, execution: { owners: [], status: "gap" }, monitoring: { owners: [], status: "gap" }, reporting: { owners: [], status: "gap" } }, overallStatus: "gap", criticalNote: "P2: Channel not established. High-conversion potential for camp reminders and content drops." },
  { name: "Analytics & Attribution", icon: "📈", phases: { strategy: { owners: ["Jeff"], status: "partial" }, content: { owners: [], status: "covered" }, execution: { owners: ["Jeff"], status: "partial" }, monitoring: { owners: ["Jeff"], status: "partial" }, reporting: { owners: ["Jeff"], status: "partial" } }, overallStatus: "partial", criticalNote: "Jeff sole owner of GA4, UTMs, attribution across all brands. No backup." },
];

const PHASES = ["strategy", "content", "execution", "monitoring", "reporting"];
const PHASE_LABELS = { strategy: "Strategy", content: "Content", execution: "Execution", monitoring: "Monitoring", reporting: "Reporting" };
const totalPhases = CHANNELS.length * 5;

let currentView = "matrix";
let currentFilter = "all";
let selectedChannel = null;

function getTeamMember(name) { return TEAM.find(t => t.short === name || t.name === name); }
function makePill(name) {
  const m = getTeamMember(name);
  const c = m ? m.color : "#9E9E9E";
  return `<span class="pill" style="background:${c}20;color:${c};border:1px solid ${c}40">${name}</span>`;
}
function makeStatusBadge(status) {
  const s = STATUS[status];
  return `<span class="status-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
}

function getJeffLoad() {
  let count = 0;
  CHANNELS.forEach(ch => { Object.values(ch.phases).forEach(p => { if (p.owners.includes("Jeff")) count++; }); });
  return count;
}

function getStatusCounts() {
  const c = { covered: 0, partial: 0, gap: 0, transition: 0 };
  CHANNELS.forEach(ch => c[ch.overallStatus]++);
  return c;
}

function renderKPIs() {
  const counts = getStatusCounts();
  const jeffLoad = getJeffLoad();
  const jeffPct = Math.round((jeffLoad / totalPhases) * 100);
  const kpis = [
    { label: "Channels", value: CHANNELS.length, sub: "Total tracked", accent: "#90CAF9" },
    { label: "Covered", value: counts.covered, sub: "Fully staffed", accent: "#43A047" },
    { label: "Partial", value: counts.partial + counts.transition, sub: "Needs attention", accent: "#F9A825" },
    { label: "Gaps", value: counts.gap, sub: "No coverage", accent: "#E53935" },
    { label: "Jeff Load", value: jeffPct + "%", sub: `${jeffLoad}/${totalPhases} phases`, accent: jeffPct > 60 ? "#E53935" : "#F9A825" },
  ];
  document.getElementById("kpiGrid").innerHTML = kpis.map(k => `
    <div class="kpi-card"><div class="kpi-bar" style="background:${k.accent}"></div>
    <div class="kpi-value" style="color:${k.accent}">${k.value}</div>
    <div class="kpi-label">${k.label}</div><div class="kpi-sub">${k.sub}</div></div>`).join("");
}

function renderControls() {
  const views = [["matrix","Coverage Matrix"],["team","Team Load"],["gaps","Gap Analysis"]];
  document.getElementById("viewTabs").innerHTML = views.map(([v,l]) => `<button class="view-tab ${currentView===v?'active':''}" onclick="switchView('${v}')">${l}</button>`).join("");
  const filters = [["all","All"],["covered","Covered"],["partial","Partial"],["gap","Gap"],["transition","Transitioning"]];
  document.getElementById("filterBtns").innerHTML = filters.map(([f,l]) => `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${l}</button>`).join("");
}

function renderMatrix() {
  const filtered = currentFilter === "all" ? CHANNELS : CHANNELS.filter(c => c.overallStatus === currentFilter);
  let html = `<div class="matrix"><div class="matrix-header"><div>Channel</div>`;
  PHASES.forEach(p => { html += `<div>${PHASE_LABELS[p]}</div>`; });
  html += `<div>Status</div></div>`;

  filtered.forEach((ch, idx) => {
    const sel = selectedChannel === ch.name;
    html += `<div class="matrix-row ${idx%2===0?'even':'odd'} ${sel?'selected':''}" onclick="toggleChannel('${ch.name}')">`;
    html += `<div class="channel-cell"><span class="channel-icon">${ch.icon}</span><span class="channel-name">${ch.name}</span></div>`;
    PHASES.forEach(p => {
      const phase = ch.phases[p];
      html += `<div class="phase-cell">${phase.owners.length ? phase.owners.map(o => makePill(o)).join("") : '<span class="empty-phase">—</span>'}</div>`;
    });
    html += `<div class="status-cell">${makeStatusBadge(ch.overallStatus)}</div></div>`;

    const noteColor = ch.overallStatus === "gap" ? "#EF9A9A" : ch.overallStatus === "transition" ? "#FFCC80" : "#B0BEC5";
    html += `<div class="detail-panel ${sel?'open':''}">`;
    html += `<div class="detail-assessment" style="color:${noteColor}"><strong style="color:#fff">Assessment:</strong> ${ch.criticalNote}</div>`;
    html += `<div class="detail-phases">`;
    PHASES.forEach(p => {
      const phase = ch.phases[p];
      const s = STATUS[phase.status];
      html += `<div class="detail-phase" style="border:1px solid ${s.color}30">`;
      html += `<div class="detail-phase-label">${PHASE_LABELS[p]}</div>`;
      html += `<div class="detail-phase-status"><span class="status-dot" style="background:${s.color}"></span><span style="font-size:11px;color:${s.color};font-weight:600">${s.label}</span></div>`;
      if (phase.note) html += `<div class="detail-phase-note">${phase.note}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  document.getElementById("matrixView").innerHTML = html;
}

function renderTeam() {
  let html = '<div class="team-grid">';
  TEAM.forEach(member => {
    const sn = member.short;
    let channelCount = 0, phaseCount = 0;
    CHANNELS.forEach(ch => {
      let found = false;
      Object.values(ch.phases).forEach(p => { if (p.owners.includes(sn)) { phaseCount++; found = true; } });
      if (found) channelCount++;
    });
    const loadPct = Math.round((phaseCount / totalPhases) * 100);
    const isOverloaded = loadPct > 40;
    const isExiting = member.type === "OUT";
    const borderColor = isExiting ? "rgba(255,112,67,0.25)" : isOverloaded ? "rgba(229,57,53,0.25)" : "#1E2538";
    const typeBg = isExiting ? "rgba(255,112,67,0.12)" : member.type==="FT" ? "rgba(30,136,229,0.12)" : member.type==="PT" ? "rgba(171,71,188,0.12)" : "rgba(120,144,156,0.12)";
    const typeColor = isExiting ? "#FF7043" : member.type==="FT" ? "#1E88E5" : member.type==="PT" ? "#AB47BC" : "#78909C";
    const typeLabel = isExiting ? "Exits Mar 11" : member.type;
    const valColor = isOverloaded ? "#E53935" : member.color;
    const barBg = isOverloaded ? "linear-gradient(90deg,#E53935,#FF7043)" : `linear-gradient(90deg,${member.color},${member.color}80)`;

    html += `<div class="team-card" style="border-color:${borderColor}"><div class="team-bar" style="background:${member.color}"></div>`;
    html += `<div class="team-top"><div><div class="team-name">${member.name}</div><div class="team-role">${member.role}</div></div>`;
    html += `<span class="team-type-badge" style="background:${typeBg};color:${typeColor}">${typeLabel}</span></div>`;
    html += `<div class="team-stats"><div><div class="team-stat-val" style="color:${valColor}">${loadPct}%</div><div class="team-stat-label">of all phases</div></div>`;
    html += `<div><div class="team-stat-val" style="color:#B0BEC5">${channelCount}</div><div class="team-stat-label">channels</div></div>`;
    html += `<div><div class="team-stat-val" style="color:#B0BEC5">${phaseCount}</div><div class="team-stat-label">phase slots</div></div></div>`;
    html += `<div class="load-bar"><div class="load-fill" style="width:${Math.min(loadPct,100)}%;background:${barBg}"></div></div>`;
    if (isOverloaded) html += `<div class="team-note" style="background:rgba(229,57,53,0.06);color:#EF9A9A;border:1px solid rgba(229,57,53,0.12)">⚠️ Capacity risk — single point of failure across multiple channels</div>`;
    if (sn === "Jessica") html += `<div class="team-note" style="background:rgba(171,71,188,0.06);color:#CE93D8;border:1px solid rgba(171,71,188,0.12)">Minor ramp-up — involved in CG launch, now expanding to all 3 brands</div>`;
    if (sn === "Esther") html += `<div class="team-note" style="background:rgba(38,166,154,0.06);color:#80CBC4;border:1px solid rgba(38,166,154,0.12)">💰 Budget available to expand social media hours</div>`;
    html += `</div>`;
  });
  html += '</div>';
  document.getElementById("teamView").innerHTML = html;
}

function renderGaps() {
  const gaps = [
    { priority: "P0", color: "#E53935", title: "Email ownership — Nick's team exits March 11", desc: "Handoff deadline approaching. All 3 brands lose email execution. Klaviyo automations unmanaged after.", solution: "Complete handoff by March 11. Jeff absorbs short-term → hire fractional email specialist or train Jessica on Klaviyo", cost: "$1,500-3,000/mo", timeline: "By March 11" },
    { priority: "P0", color: "#E53935", title: "Jeff overload / single point of failure", desc: "Paid ads (Meta + Google), analytics, strategy, email (post-March 11), partnerships mgmt all flow through Jeff.", solution: "Hire fractional paid media specialist for Meta + Google Ads day-to-day optimization", cost: "$2,500-5,000/mo", timeline: "Before peak season" },
    { priority: "P1", color: "#FB8C00", title: "Social media hours — need to expand", desc: "Esther is part-time. 3 brands × daily posting + community management exceeds current hours.", solution: "Increase Esther's hours or add a second PT social person. Budget available.", cost: "Budget allocated", timeline: "Immediate" },
    { priority: "P1", color: "#FB8C00", title: "Video execution pipeline", desc: "Ryan Noll on high-end edits. Other freelancers for cuts. No consistent production pipeline, especially for CG.", solution: "Formalize Ryan Noll retainer for camp season; establish freelancer bench for ongoing edits", cost: "$2,000-4,000/mo", timeline: "Before camp season" },
    { priority: "P2", color: "#F9A825", title: "SMS / push not established", desc: "Missing high-conversion channel for camp reminders, ranking alerts, content drops.", solution: "Evaluate Klaviyo SMS or dedicated tool; Jeff + Jessica scope", cost: "Platform + setup", timeline: "Q3 2026" },
    { priority: "P2", color: "#F9A825", title: "Analytics has no backup", desc: "If Jeff is unavailable, zero people can pull reports or troubleshoot tracking.", solution: "Document GA4 setup; train Jessica or Erika on basic reporting", cost: "Internal time", timeline: "Q2 2026" },
  ];
  let html = '';
  gaps.forEach(g => {
    html += `<div class="gap-card"><div style="text-align:center"><span class="gap-priority" style="background:${g.color}20;color:${g.color}">${g.priority}</span></div>`;
    html += `<div><div class="gap-title">${g.title}</div><div class="gap-desc">${g.desc}</div></div>`;
    html += `<div><div class="gap-section-label">Recommendation</div><div class="gap-section-text">${g.solution}</div></div>`;
    html += `<div style="text-align:center"><div class="gap-section-label">Est. Cost</div><div class="gap-cost">${g.cost}</div></div>`;
    html += `<div style="text-align:center"><div class="gap-section-label">Timeline</div><div class="gap-timeline" style="color:${g.color}">${g.timeline}</div></div></div>`;
  });
  document.getElementById("gapsView").innerHTML = html;
}

function renderFooter() {
  document.getElementById("footerRoster").innerHTML = TEAM.map(m => `
    <div class="roster-item"><div class="roster-dot" style="background:${m.color}"></div>
    <span class="roster-name">${m.name}</span><span class="roster-role">— ${m.role}</span></div>`).join("");
}

function switchView(v) {
  currentView = v;
  document.getElementById("matrixView").classList.toggle("hidden", v !== "matrix");
  document.getElementById("teamView").classList.toggle("hidden", v !== "team");
  document.getElementById("gapsView").classList.toggle("hidden", v !== "gaps");
  renderControls();
}

function setFilter(f) { currentFilter = f; renderControls(); renderMatrix(); }
function toggleChannel(name) { selectedChannel = selectedChannel === name ? null : name; renderMatrix(); }

// Init
renderKPIs(); renderControls(); renderMatrix(); renderTeam(); renderGaps(); renderFooter();
</script>
</body>
</html>
